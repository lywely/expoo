<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Expoo</title>
    <meta name="description" content="Team Expoo roster: players, roles and profiles.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="TEAM EXPOO — Roster">
    <meta property="og:description" content="Players, roles and profiles.">
    <meta property="og:image" content="images/expoologo.png">
    <link rel="icon" type="image/x-icon" href="images/expoologo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body data-page="roster">
    <div id="site-header"></div>

    <main class="roster-page">
        <section class="page-hero">
            <h1 class="page-title" data-i18n="roster.hero.title">ACTIVE ROSTER</h1>
            <p class="page-subtitle" data-i18n="roster.hero.subtitle">FUTURE OF COUNTER-STRIKE</p>
        </section>

        <section class="full-roster">
            <div class="roster-controls" role="search" aria-label="Roster search and filters">
                <input
                    id="roster-search"
                    type="search"
                    class="roster-search"
                    placeholder="Поиск игрока"
                    autocomplete="off"
                />
                <select id="roster-role" class="roster-role" aria-label="Filter by role"></select>
            </div>
            
            <div id="roster-list" class="roster-list" aria-label="Player list"></div>

            <div id="roster-empty" class="roster-empty matches-empty" hidden></div>
            </section>
    </main>

    <div id="site-footer"></div>
    <script src="script.js" defer></script>
    </body>
</html>
