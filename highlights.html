<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Expoo — Highlights</title>
    <meta name="description" content="Best Team Expoo highlights: clutches, aces and key rounds.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="TEAM EXPOO — Highlights">
    <meta property="og:description" content="Clutches, aces and best moments.">
    <meta property="og:image" content="images/expoologo.png">
    <link rel="icon" type="image/x-icon" href="images/expoologo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body data-page="highlights">

    <div id="site-header"></div>

    <main>
        <section class="page-hero">
            <h1 class="page-title" data-i18n="highlights.hero.title">HIGHLIGHTS</h1>
            <p class="page-subtitle" data-i18n="highlights.hero.subtitle">BEST MOMENTS OF TEAM EXPOO</p>
        </section>

        <section class="highlights-page">
            <div class="highlights-header">
                <h2 data-i18n="highlights.header.title">Лучшие моменты</h2>
                <p data-i18n="highlights.header.subtitle">Клатчи, эйсы и самые важные раунды. Все лучшие моменты Team Expoo в одном месте.</p>
            </div>

            <div class="highlights-controls" role="search" aria-label="Highlights filters">
                <input
                    id="highlights-search"
                    type="search"
                    class="highlights-search"
                    placeholder="Поиск по хайлайтам"
                    autocomplete="off"
                />
                <select id="highlights-platform" class="highlights-platform" aria-label="Filter by platform">
                    <option value="all">All</option>
                    <option value="youtube">YouTube</option>
                </select>
            </div>

            <div id="highlights-grid" class="highlights-grid">
                <!-- Карточки хайлайтов рендерятся через script.js -->
            </div>
        </section>

        <!-- Модалка для просмотра хайлайтов -->
        <div id="highlight-modal" class="highlight-modal hidden">
            <div class="highlight-modal-backdrop" data-close="highlight"></div>
            <div class="highlight-modal-content">
                <button class="highlight-modal-close" type="button" data-close="highlight">&times;</button>
                <div id="highlight-modal-body" class="highlight-modal-body"></div>
            </div>
        </div>
    </main>


    <div id="site-footer"></div>

    <script src="script.js" defer></script>
</body>
</html>
