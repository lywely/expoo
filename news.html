<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM EXPOO</title>
    <meta name="description" content="Latest Team Expoo news, announcements and match updates.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="TEAM EXPOO — News">
    <meta property="og:description" content="Latest news, announcements and match updates.">
    <meta property="og:image" content="images/expoologo.png">
    <link rel="icon" type="image/x-icon" href="images/expoologo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body data-page="news">

    <div id="site-header"></div>
        
        <main class="news-page">
    <section class="page-hero">
        <h1 class="page-title" data-i18n="news.hero.title">EXPOO NEWS</h1>
        <p class="page-subtitle" data-i18n="news.hero.subtitle">НОВОСТИ TEAM EXPOO</p>
    </section>

        <section class="news-container reveal">
            <div id="news-featured" class="news-featured-wrapper" aria-label="Featured news"></div>

            <div class="tg-news" aria-label="Telegram news">
                <div class="tg-news-head">
                    <h2 class="tg-news-title" data-i18n="news.tg.title">TELEGRAM</h2>
                    <p class="tg-news-sub" data-i18n="news.tg.subtitle">Latest posts from our Telegram channel</p>
                </div>
                <div class="tg-news-grid" id="tg-news-grid"></div>
                <div class="tg-news-fallback" id="tg-news-fallback" hidden>
                    <p data-i18n="news.tg.fallback">Telegram posts are unavailable right now.</p>
                    <a class="btn btn-ghost" href="#" target="_blank" rel="noopener" data-i18n="news.tg.open" data-tg-channel-link>Open channel</a>
                </div>
            </div>

            <div class="news-grid" id="news-grid" aria-label="News list"></div>
            <noscript>
                <div class="news-fallback">
                    <p data-i18n="news.noscript">Для просмотра новостей требуется JavaScript. Пожалуйста, включите его в настройках браузера.</p>
                </div>
            </noscript>

            <div id="news-modal" class="news-modal hidden" role="dialog" aria-modal="true">
                <div class="news-modal-backdrop" data-close="true"></div>
                <div class="news-modal-content">
                    <button class="news-modal-close" data-close="true" aria-label="Close">×</button>
                    <div class="news-modal-body" id="news-modal-body"></div>
                </div>
            </div>
        </section>
        </main>



    <div id="site-footer"></div>

    <script src="script.js" defer></script>
</body>
</html>
